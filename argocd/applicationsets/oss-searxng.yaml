apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: oss-searxng-applicationset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: oke
            project: cloud
            cluster: oke
  template:
    metadata:
      name: "oss-searxng-{{ .name }}"
    spec:
      project: "{{ .project }}"
      # First-party Helm chart (ArgoCD auto-detects Helm from Chart.yaml). Official
      # searxng/searxng image is pulled from Docker Hub, so no ghcr custom-image
      # pull secret / custom-image namespace label is needed.
      source:
        repoURL: https://github.com/BeaverHouse/cicd.git
        targetRevision: main
        path: charts/oss-searxng
      destination:
        name: "{{ .cluster }}"
        namespace: searxng
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
