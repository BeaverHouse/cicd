replicaCount: 1

image:
  repository: docker.io/searxng/searxng
  # Pin a real published tag (docs version 2026.6.14+b3e08f2a4 → docker tag uses '-');
  # verify the exact tag on Docker Hub before bumping.
  tag: "2026.6.14-b3e08f2a4"
  pullPolicy: IfNotPresent

# busybox is used by the init container to inject a random secret_key.
initImage:
  repository: busybox
  tag: "1.37"

service:
  type: ClusterIP
  port: 8080

searxng:
  instanceName: "tinyclover-searxng"
  # Cluster-internal base URL (its own Service address). Used for correct link
  # generation; not publicly exposed.
  baseUrl: "http://searxng.searxng.svc.cluster.local:8080/"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
