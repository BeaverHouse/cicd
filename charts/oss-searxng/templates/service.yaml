# Cluster-internal only (ClusterIP, no Ingress/HTTPRoute). data-aggregator reaches
# it via http://searxng.searxng.svc.cluster.local:8080.
apiVersion: v1
kind: Service
metadata:
  name: searxng
  labels:
    {{- include "oss-searxng.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "oss-searxng.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
