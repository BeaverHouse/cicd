# Non-secret SearXNG settings. secret_key is the placeholder "ultrasecretkey" and
# is replaced at startup by the init container with a random value (see
# deployment.yaml) — never store a real secret_key in a ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  labels:
    {{- include "oss-searxng.labels" . | nindent 4 }}
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: {{ .Values.searxng.instanceName | quote }}
      debug: false
    server:
      base_url: {{ .Values.searxng.baseUrl | quote }}
      secret_key: "ultrasecretkey"   # replaced at startup (init container)
      limiter: false                 # cluster-internal only → no public abuse surface
      image_proxy: false
    search:
      autocomplete: ""               # off; data-aggregator only needs JSON results
      formats:
        - html
        - json                       # REQUIRED so data-aggregator can consume JSON
    # Per-engine overrides (merged onto defaults by name via use_default_settings).
    # NOTE: settings.yml uses `disabled` (inverse of the /config readout's `enabled`).
    engines:
      - name: bing
        disabled: false              # default-off; bing is datacenter-IP friendly → enable for recall
      - name: startpage
        disabled: true               # consistently CAPTCHA-suspended (1h) → dead weight, drop it
