apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-external-secret
  namespace: bifrost
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: gitlab-clustersecretstore
    kind: ClusterSecretStore
  target:
    name: bifrost-secret
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ANTHROPIC_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: OPENAI_API_KEY
    - secretKey: XAI_API_KEY
      remoteRef:
        key: XAI_API_KEY
    # New GitLab variable: generate once with `openssl rand -base64 32`.
    - secretKey: BIFROST_ENCRYPTION_KEY
      remoteRef:
        key: BIFROST_ENCRYPTION_KEY
    - secretKey: BIFROST_POSTGRES_HOST
      remoteRef:
        key: SUPABASE_POSTGRES_HOST
    # Dedicated Postgres role with search_path=bifrost — Bifrost has no
    # app-level schema option, so the role keeps its tables out of public
    # (and away from service schemas). New GitLab variables.`
    - secretKey: BIFROST_POSTGRES_USER
      remoteRef:
        key: BIFROST_POSTGRES_USER
    - secretKey: BIFROST_POSTGRES_PASSWORD
      remoteRef:
        key: BIFROST_POSTGRES_PASSWORD
