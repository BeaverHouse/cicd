# Party analysis worker: consumes the queue and analyzes videos via Gemini.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ba-party-analyze-job
spec:
  # KST 13:00, 21:00 — consumes the queue twice a day, in its own slots.
  timeZone: "Asia/Seoul"
  schedule: "0 13,21 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      completions: 1
      template:
        metadata:
          labels:
            app: ba-party-analyze
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ba-party-analyzer
              image: ghcr.io/beaverhouse/ba-party-analysis:b9a2f8a7
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: ba-worker-secret
              env:
                - name: GO_ENV
                  value: "production"
              # Moderate: Gemini API calls + thumbnail/metadata fetch.
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "1"
                  memory: "512Mi"
