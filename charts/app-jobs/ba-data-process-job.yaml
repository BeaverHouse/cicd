# Data processing job (DuckDB-backed aggregation). CPU-bound; runs once daily.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ba-data-process-job
spec:
  # KST 05:00 — dawn, just after the monthly reboot window (03:00-05:00).
  timeZone: "Asia/Seoul"
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      completions: 1
      template:
        metadata:
          labels:
            app: ba-data-process
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ba-data-process
              image: ghcr.io/beaverhouse/ba-data-process:9fc3a947
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: ba-worker-secret
              env:
                - name: GO_ENV
                  value: "production"
              # CPU-bound (DuckDB disk-based + N+1 queries), not memory-heavy.
              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1500m"
                  memory: "768Mi"
