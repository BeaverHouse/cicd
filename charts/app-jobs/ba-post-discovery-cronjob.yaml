# Post-discovery (Bilibili headless-Chromium search + YouTube score search).
# Heavy + occasional: back-fills ended raids. Split from the old combined
# discovery cronjob. Runs once daily, alone in its slot.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ba-post-discovery-cronjob
spec:
  # KST 19:00 (evening). Heaviest job (drives Chromium); given a wide slot.
  timeZone: "Asia/Seoul"
  schedule: "0 19 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ba-post-discovery
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ba-post-discovery
              image: ghcr.io/beaverhouse/ba-post-discovery:2c883851
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: ba-worker-secret
              env:
                - name: GO_ENV
                  value: "production"
              # Heaviest: headless Chromium is memory-hungry (uses /tmp, not
              # /dev/shm). Generous memory headroom; runs alone in its slot.
              resources:
                requests:
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
