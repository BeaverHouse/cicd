# Realtime discovery (YouTube-only, slim image). Light + frequent: scans active
# raids and enqueues new videos. Split from the old combined discovery cronjob.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ba-autodiscovery-cronjob
spec:
  # KST 02:00, 12:00, 22:00. Light job; kept clear of the heavier jobs and of
  # the monthly reboot window (KST 03:00-05:00 on the 1st).
  timeZone: "Asia/Seoul"
  schedule: "0 2,12,22 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: ba-autodiscovery
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ba-autodiscovery
              image: ghcr.io/beaverhouse/ba-autodiscovery:df929fcf
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: ba-worker-secret
              env:
                - name: GO_ENV
                  value: "production"
              # Light: YouTube API calls only, no browser.
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
