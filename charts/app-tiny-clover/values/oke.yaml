    tag: "91b1b517"
  imagePullSecrets:
    - name: ghcr-secret
  nameOverride: "llm-client"
  fullnameOverride: "llm-client"
  service:
    type: ClusterIP
    api:
      port: 8080
    mcp:
      enabled: false
  resources: *common-resources
  livenessProbe:
    httpGet:
      path: /v1/health
      port: api
    periodSeconds: 120
  readinessProbe:
    httpGet:
      path: /v1/health
      port: api
    periodSeconds: 120
  externalSecret:
    enabled: true
    data:
      - secretKey: "POSTGRES_HOST"
        remoteRef:
          key: "SUPABASE_POSTGRES_HOST"
      - secretKey: "POSTGRES_USER"
        remoteRef:
          key: "SUPABASE_POSTGRES_USER"
      - secretKey: "POSTGRES_PASSWORD"
        remoteRef:
          key: "SUPABASE_POSTGRES_PASSWORD"
      - secretKey: "SUPABASE_JWT_KEYFUNC_URL"
        remoteRef:
          key: "SUPABASE_JWT_KEYFUNC_URL"
      # LITELLM_* entries serve the currently deployed image; remove them
      # after the Bifrost-cutover image (reads LLM_GATEWAY_*) is deployed.
      - secretKey: "LITELLM_API_KEY"
        remoteRef:
          key: "LITELLM_API_KEY"
      - secretKey: "LITELLM_MASTER_KEY"
        remoteRef:
          key: "LITELLM_MASTER_KEY"
      - secretKey: "LLM_GATEWAY_API_KEY"
        remoteRef:
          key: "LITELLM_API_KEY"
      - secretKey: "LLM_GATEWAY_MASTER_KEY"
        remoteRef:
          key: "LITELLM_MASTER_KEY"
      - secretKey: "BA_ANALYZER_SERVICE_TOKEN"
        remoteRef:
          key: "BA_ANALYZER_SERVICE_TOKEN"
  httproute:
    enabled: true
    parentRefs:
      - name: api-gateway
        sectionName: https-llm
    hostnames:
      - llm.tinyclover.com
    annotations:
      external-dns.alpha.kubernetes.io/set-identifier: "oke-cluster-gateway"
      external-dns.alpha.kubernetes.io/aws-weight: "100"
    rules:
      - path:
          type: PathPrefix
          value: /v1
        timeouts:
          request: 60s
          backendRequest: 60s
  clientSettings:
    enabled: true
    body:
      maxSize: 10m
      timeout: 60s
  envFrom:
    - secretRef:
        name: llm-client-secret
  extraEnv:
    - name: GO_ENV
      value: "production"
    # Used by the currently deployed image; remove after the Bifrost cutover.
    - name: LITELLM_ENDPOINT
      value: "http://litellm.litellm.svc.cluster.local:4000"
    # Bifrost gateway (inference requires the /v1 path).
    - name: LLM_GATEWAY_ENDPOINT
      value: "http://bifrost.bifrost.svc.cluster.local:8080/v1"
    - name: GATEWAY_GOVERNANCE
      value: "bifrost"
