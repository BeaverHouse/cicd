# OKE (Oracle Kubernetes Engine) cluster configuration

# Gateway configuration (Phase 1: disabled, Phase 2: enabled)
gateway:
  enabled: true
# Common configurations
common-resources: &common-resources
  limits:
    cpu: 50m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi
ae-analyzer:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/beaverhouse/tinyclover-ae-analyzer
    pullPolicy: IfNotPresent
    tag: "cdcc5222"
  imagePullSecrets:
    - name: ghcr-secret
  nameOverride: "ae-analyzer"
  fullnameOverride: "ae-analyzer"
  service:
    type: ClusterIP
    api:
      port: 8086
    mcp:
      enabled: false
  resources: *common-resources
  livenessProbe:
    httpGet:
      path: /ae-analyzer/v1/health
      port: api
    periodSeconds: 120
  readinessProbe:
    httpGet:
      path: /ae-analyzer/v1/health
      port: api
    periodSeconds: 120
  externalSecret:
    enabled: true
    data:
      - secretKey: "POSTGRES_HOST"
        remoteRef:
          key: "SUPABASE_POSTGRES_HOST"
      - secretKey: "POSTGRES_USER"
        remoteRef:
          key: "SUPABASE_POSTGRES_USER"
      - secretKey: "POSTGRES_PASSWORD"
        remoteRef:
          key: "SUPABASE_POSTGRES_PASSWORD"
      - secretKey: "SUPABASE_JWT_KEYFUNC_URL"
        remoteRef:
          key: "SUPABASE_JWT_KEYFUNC_URL"
  httproute:
    enabled: true
    parentRefs:
      - name: api-gateway
        sectionName: https-api
    hostnames:
      - api.tinyclover.com
    annotations:
      external-dns.alpha.kubernetes.io/set-identifier: "oke-cluster-gateway"
      external-dns.alpha.kubernetes.io/aws-weight: "100"
    rules:
      - path:
          type: PathPrefix
          value: /ae-analyzer/v1
        timeouts:
          request: 60s
          backendRequest: 60s
  clientSettings:
    enabled: true
    body:
      maxSize: 10m
      timeout: 60s
  envFrom:
    - secretRef:
        name: ae-analyzer-secret
  extraEnv:
    - name: GO_ENV
      value: "production"
