# ArgoCD values for Home Server (Colima + K3s)
# Uses Gateway API (HTTPRoute) instead of Ingress

global:
  domain: v2.argocd.haulrest.me

configs:
  params:
    server.insecure: true # TLS termination is handled by Gateway
  cm:
    # GitHub configuration from https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml#L227-L238
    # You need to create OAuth app from GitHub.
    dex.config: |
      connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $oauth-secret:clientId
          clientSecret: $oauth-secret:clientSecret
          loadAllGroups: true
          orgs:
            - name: BeaverHouse
  rbac:
    policy.csv: |
      g, BeaverHouse:Owner, role:admin

server:
  # Enable Gateway API HTTPRoute
  httproute:
    enabled: true
    parentRefs:
      - name: home-gateway
        namespace: nginx-gateway
        sectionName: https
    hostnames:
      - v2.argocd.haulrest.me
